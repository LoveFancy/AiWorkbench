name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install

      - name: Build Electron app
        run: bun run electron:build

      - name: Read app version
        shell: pwsh
        run: |
          $package = Get-Content 'apps/electron/package.json' | ConvertFrom-Json
          "APP_VERSION=$($package.version)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "APP_VERSION=$($package.version)"

      - name: Build Windows NSIS installer
        working-directory: apps/electron
        shell: pwsh
        run: |
          for ($i = 1; $i -le 3; $i++) {
            bun run dist:win -- --x64 --publish never
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($i -eq 3) {
              exit $LASTEXITCODE
            }

            Write-Host "Windows installer build attempt $i failed, retrying in 20s..."
            Start-Sleep -Seconds 20
          }

      - name: Verify auto-update artifacts
        shell: pwsh
        run: |
          $outDir = 'apps/electron/out'
          $latest = Join-Path $outDir 'latest.yml'
          $exe = Get-ChildItem -Path $outDir -Filter '*.exe' | Select-Object -First 1
          $blockmap = Get-ChildItem -Path $outDir -Filter '*.exe.blockmap' | Select-Object -First 1

          if (-not (Test-Path $latest)) {
            throw '未找到 latest.yml 自动更新元数据'
          }
          if (-not $exe) {
            throw '未找到 NSIS exe 安装包'
          }
          if (-not $blockmap) {
            throw '未找到 exe.blockmap 差分更新文件'
          }

          Write-Host "latest.yml: $latest"
          Write-Host "exe: $($exe.FullName)"
          Write-Host "blockmap: $($blockmap.FullName)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HtAiWorkBench-windows-v${{ env.APP_VERSION }}-auto-update
          path: |
            apps/electron/out/latest.yml
            apps/electron/out/*.exe
            apps/electron/out/*.exe.blockmap
