name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install

      - name: Build Electron app
        run: bun run electron:build

      - name: Build Windows installer
        working-directory: apps/electron
        run: bun run dist:win -- msi --x64 --publish never

      - name: Rename MSI artifact
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path apps/electron/out -Filter '*.msi' | Select-Object -First 1
          if (-not $msi) {
            throw '未找到 MSI 构建产物'
          }
          Move-Item -Path $msi.FullName -Destination 'apps/electron/out/HtAiDevAssist.msi' -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HtAiDevAssist-windows-msi
          path: apps/electron/out/HtAiDevAssist.msi
