version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: workmate-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: workmate_server
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: workmate-server
    restart: unless-stopped
    ports:
      - "6173:6173"
    environment:
      DATABASE_URL: "jdbc:mysql://mysql:3306/workmate_server?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai"
      DB_USERNAME: "root"
      DB_PASSWORD: "root_password"
      USER_ID_ENCRYPTION_KEY: ""
      MODEL_PLATFORM_API_URL: "http://model-platform.htsc.com/api/v1"
      MODEL_PLATFORM_TIMEOUT_MS: "10000"
      REQUIRE_USER_ID: "true"
      LOG_LEVEL: "info"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
