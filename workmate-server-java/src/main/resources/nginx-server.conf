# WorkMate Server - 独立 server 配置
# ============================================================
# 本文件只包含一个 server 块，配合独立 access_log / error_log。
# 必须被主 nginx.conf 的 http {} 块通过 include 引入：
#
#   http {
#       include nginx-server.conf;   # ← 在主配置 http 块内引用
#   }
#
# 文件结构要点：
#   - 没有 events、http、worker_processes 等顶级块
#   - access_log / error_log 在 server 块内独立声明（覆盖 http 块默认值）
#   - 所有 listen / server_name / location 都在本文件内独立管理
# ============================================================

server {
    # ===== 监听 / 主机名 =====
    listen 18080;
    server_name _;

    # ===== 独立访问日志 / 错误日志（与主 nginx.log 隔离） =====
    access_log /app/workmate/nginxlog/server-access.log main;
    error_log  /app/workmate/nginxlog/server-error.log warn;

    # ===== 通用请求体大小（与 Spring Boot 对齐：1MB） =====
    client_max_body_size 1m;

    # ========== 管理台静态页面 (SPA) ==========
    # 从 /app/workmate/web 提供静态资源，支持 SPA 回退
    location /workmate/admin/ {
        alias /app/workmate/web/;
        index  index.html;
        try_files $uri $uri/ /workmate/admin/index.html;
    }

    # ========== WorkMate 安装包下载 ==========
    location /workmate/releases/ {
        alias /app/workmate/releases/;

        autoindex off;

        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=3600";

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;

        access_log /app/workmate/nginxlog/releases-access.log main;
        error_log  /app/workmate/nginxlog/releases-error.log warn;
    }

    # ========== 发布版本上传接口 ==========
    # 同时匹配 /workmate/console/releases/upload 和 /workmate/console/upgrade/releases/upload
    location ~ ^/workmate/console/(upgrade/)?releases/upload {
        client_max_body_size 2g;

        proxy_pass http://127.0.0.1:6173;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 30s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        proxy_request_buffering on;
    }

    # ========== API 代理到 Spring Boot ==========
    # 所有 /workmate/ 下的接口请求转发到后端服务
    location /workmate/ {
        proxy_pass http://127.0.0.1:6173;
        proxy_http_version 1.1;

        # 请求头透传
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接与超时
        proxy_set_header Connection      "";
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;

        # 缓冲设置
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 16k;
    }

    # ========== 根路径 ==========
    location = / {
        return 301 /workmate/admin/;
    }
}
