# ============================================================
# WorkMate Server - 生产环境配置（profile: prod）
# ============================================================
# 启动方式：bin/start.sh --profile prod
# 公共配置（server、mybatis、jackson、HikariCP 基础、logging 路径/格式）
# 在 application.yml 中；本文件仅配置生产环境差异化项。
# 密钥、URL、用户名等敏感值必须通过环境变量注入。
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:workmate_server}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

workmate:
  user-id-encryption-key: ${USER_ID_ENCRYPTION_KEY}
  require-user-id: true
  default-user-id:
  model-platform-api-url: http://model-platform.htsc.com/api/v1

