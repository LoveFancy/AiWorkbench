# WorkMate Nginx 主配置（生产环境）
# 统一入口：监听 18080，静态页面由 Nginx 直接响应，API 请求代理到 Spring Boot (6173)
#
# ============================================================
# 配置文件结构（严格嵌套，每种块只能有规定的数量）
# ============================================================
#   main context         ← 全局（worker_processes / pid / error_log）
#   ├── events { ... }   ← 事件模型，整个文件只能有 1 个
#   └── http { ... }     ← HTTP 协议配置，整个文件只能有 1 个（多 http 会启动失败）
#       ├── include ...  ← 引入其他 server / upstream 配置文件
#       ├── upstream { } ← 上游服务池（可选，可多个）
#       ├── server { }   ← 虚拟主机（可多个，监听不同端口或 server_name）
#       │   ├── location /a { }
#       │   ├── location /b { }
#       │   └── location ~ \.php$ { }
#       └── server { }   ← 另一个虚拟主机
# ============================================================
#
# 本文件采用"主框架 + 独立 server"模式：
#   - nginx.conf       负责全局 / events / http 公共配置（gzip、client_max_body_size、log_format 等）
#   - nginx-server.conf 负责具体 server 块与独立日志（listen 18080、各 location 规则）
# 在 http 块内通过 include 引入。

# ===== main context =====
worker_processes auto;
error_log /app/workmate/nginxlog/error.log warn;
pid        /app/workmate/nginxlog/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

# ===== http context（整个文件只能有 1 个） =====
http {
    include       mime.types;
    default_type  application/octet-stream;

    # 日志格式（供 server 块 access_log 引用）
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # HTTP 公共优化
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript
               application/xml application/rss+xml image/svg+xml font/woff2;

    # 请求体大小限制（与 Spring Boot 对齐：1MB）
    client_max_body_size 1m;

    # ===== 引入独立 server 配置（独立日志、独立路由） =====
    include nginx-server.conf;
}
