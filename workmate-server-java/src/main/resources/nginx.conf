# WorkMate Nginx 配置（生产环境）
# 统一入口：监听 18080，静态页面由 Nginx 直接响应，API 请求代理到 Spring Boot (6173)

worker_processes auto;
error_log /app/workmate/nginxlog/error.log warn;
pid /app/workmate/nginxlog/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /app/workmate/nginxlog/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/json application/javascript
               application/xml application/rss+xml image/svg+xml font/woff2;

    # 请求体大小限制（与 Spring Boot 对齐：1MB）
    client_max_body_size 1m;

    server {
        listen 18080;
        server_name _;

        # ========== 管理台静态页面 (SPA) ==========
        # 从 /app/workmate/web 提供静态资源，支持 SPA 回退
        location /workmate/admin/ {
            alias /app/workmate/web/;
            index index.html;
            try_files $uri $uri/ /workmate/admin/index.html;
        }

        # ========== API 代理到 Spring Boot ==========
        # 所有 /workmate/ 下的接口请求转发到后端服务
        location /workmate/ {
            proxy_pass http://127.0.0.1:6173;
            proxy_http_version 1.1;

            # 请求头透传
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 长连接与超时
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_read_timeout 60s;
            proxy_send_timeout 30s;

            # 缓冲设置
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
        }

        # ========== 根路径 ==========
        location = / {
            return 301 /workmate/admin/;
        }
    }
}
