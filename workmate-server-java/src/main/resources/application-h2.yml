# ===== H2 数据库 Profile =====
# 激活方式：设置环境变量 DB_TYPE=h2 或启动参数 -Dspring.profiles.active=h2
# 用途：本地开发测试，无需安装 MySQL

spring:
  datasource:
    url: jdbc:h2:file:./data/workmate;MODE=MYSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/h2-migration
    baseline-on-migrate: true

pagehelper:
  helper-dialect: mysql
