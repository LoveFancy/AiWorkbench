# ============================================================
# WorkMate Server - 公共配置
# ============================================================
# 此文件仅包含所有环境完全相同的固定值。
# 各环境差异化配置（数据库、密钥、模型平台、池大小、日志级别等）
# 全部在 application-<profile>.yaml 中显式配置。
# ============================================================

server:
  port: 6173
  address: 0.0.0.0
  max-http-request-header-size: 16KB

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    # 驱动类所有 MySQL 环境一致
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 公共基础配置（连接超时、生命周期、池名）
    hikari:
      maximum-pool-size: 100
      minimum-idle: 30
      pool-name: WorkMateHikariCP
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
     
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.workmate.server.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

jackson:
  default-property-inclusion: non_null
  serialization:
    write-dates-as-timestamps: false

# ===== 业务公共参数（所有环境一致） =====
workmate:
  model-platform-timeout-ms: 10000
  observability-sample-rate: 1.0
  observability-max-events-per-minute: 60

  # ===== 大模型平台认证（测试 & 生产共用） =====
  model-platform:
    auth-url: "http://168.63.65.40:8090/llm-service/apikey/model/auth"
    default-provider: "anthropic"
    provider-url-mapping:
      openai: "http://168.63.65.40:8090/llm-service/v1/chat/completions"
      anthropic: "http://168.63.65.40:8090/llm-service/v1/messages"

  # ===== LLM 大模型服务调用地址 =====
  llm-service:
    base-url: "http://168.63.65.40:8090/llm-service/v1"
    openai-path: "/chat/completions"
    anthropic-path: "/messages"

# ===== 日志公共基础（路径、格式） =====
logging:
  level:
    root: info
    com.workmate.server: info
  file:
    name: logs/server.log
    max-size: 100MB
    max-history: 30
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
   