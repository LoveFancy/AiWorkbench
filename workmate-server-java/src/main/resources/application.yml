server:
  port: 6173
  address: 0.0.0.0
  max-http-request-header-size: 8KB

spring:
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/workmate_server?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:fxd1993}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.workmate.server.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

workmate:
  user-id-encryption-key: ${USER_ID_ENCRYPTION_KEY:}
  require-user-id: ${REQUIRE_USER_ID:false}
  default-user-id: ${DEFAULT_USER_ID:test_user}
  model-platform-api-url: ${MODEL_PLATFORM_API_URL:http://model-platform.htsc.com/api/v1}
  model-platform-timeout-ms: ${MODEL_PLATFORM_TIMEOUT_MS:10000}
  observability-sample-rate: ${OBSERVABILITY_SAMPLE_RATE:1.0}
  observability-max-events-per-minute: ${OBSERVABILITY_MAX_EVENTS_PER_MINUTE:60}

logging:
  level:
    root: ${LOG_LEVEL:info}
    com.workmate.server: ${LOG_LEVEL:info}
