# ============================================================
# WorkMate Server - 开发环境配置（profile: dev）
# ============================================================
# 启动方式：bin/start.sh --profile dev
# 区别于 local-dev：连接开发服务器数据库，关闭身份校验便于联调。
# 公共配置在 application.yml 中；本文件仅配置开发服务器差异化项。
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME:workmate_server}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

workmate:
  user-id-encryption-key: ${USER_ID_ENCRYPTION_KEY:}
  require-user-id: false
  default-user-id: ${DEFAULT_USER_ID:test_user}
  model-platform-api-url: http://model-platform-dev.htsc.com/api/v1
